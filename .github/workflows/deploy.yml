# Eclipse Frontend — S3 + CloudFront 배포 워크플로우
#
# 필요 GitHub Secrets:
#   VITE_LEDGER_URL      — ledger-app API URL
#   VITE_SERVICE_URL     — service-app API URL
#   S3_BUCKET            — S3 버킷명
#   CF_DISTRIBUTION_ID   — CloudFront 배포 ID
#
# AWS 인증은 OIDC로 처리 (별도 Access Key 불필요)

name: Deploy Frontend

on:
  push:
    branches: [main]

env:
  AWS_ROLE_ARN: arn:aws:iam::496009355626:role/eclipse-github-actions-role
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_LEDGER_URL: ${{ secrets.VITE_LEDGER_URL }}
          VITE_SERVICE_URL: ${{ secrets.VITE_SERVICE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (assets - long cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "manifest.webmanifest" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload PWA files (no cache)
        run: |
          aws s3 cp dist/sw.js s3://${{ secrets.S3_BUCKET }}/sw.js \
            --cache-control "no-store"
          aws s3 cp dist/manifest.webmanifest s3://${{ secrets.S3_BUCKET }}/manifest.webmanifest \
            --cache-control "no-store"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-store"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
