# Eclipse Frontend — S3 + CloudFront 배포 워크플로우
#
# 필요 GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       — AWS IAM 사용자 액세스 키 ID
#   AWS_SECRET_ACCESS_KEY   — AWS IAM 사용자 시크릿 액세스 키
#   S3_BUCKET               — S3 버킷명 (e.g. eclipse-frontend-prod)
#   CF_DISTRIBUTION_ID      — CloudFront 배포 ID (e.g. EXXXXXXXXXX)
#   VITE_LEDGER_URL         — ledger-app API URL (e.g. https://api.yourdomain.com/api/ledger)
#   VITE_SERVICE_URL        — service-app API URL (e.g. https://api.yourdomain.com/api/service)

name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_LEDGER_URL: ${{ secrets.VITE_LEDGER_URL }}
          VITE_SERVICE_URL: ${{ secrets.VITE_SERVICE_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Sync to S3 (assets - long cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-store"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
